<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM File Viewer</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f7faff;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #1a4e8a;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #1a73e8;
      color: white;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #e6eef8;
    }

    tr:nth-child(even) {
      background: #f2f7fd;
    }

    th {
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    button {
      padding: 6px 12px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #155ab6;
    }

    .no-data {
      text-align: center;
      color: #666;
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>File Viewer</h1>
  <div id="table-container"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw4rP37nJ3yEFzi7yQRFHAii-e_37U9_nHtSaA_PKC86aBg5-dOupFUjsoFZThyej-UqQ/exec";
    const CLIENT_CACHE_TTL_MS = 300000;
    const FILE_ID_REGEX = /\/d\/([a-zA-Z0-9-_]+)/;

    function getCacheKey(crm) {
      return `crm-file-viewer:${crm.toLowerCase()}`;
    }

    function readClientCache(crm) {
      try {
        const raw = sessionStorage.getItem(getCacheKey(crm));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.expiry || !Array.isArray(parsed.data)) return null;
        if (Date.now() > parsed.expiry) {
          sessionStorage.removeItem(getCacheKey(crm));
          return null;
        }
        return parsed.data;
      } catch (_err) {
        return null;
      }
    }

    function writeClientCache(crm, data) {
      try {
        sessionStorage.setItem(
          getCacheKey(crm),
          JSON.stringify({
            expiry: Date.now() + CLIENT_CACHE_TTL_MS,
            data: data
          })
        );
      } catch (_err) {
        // Ignore cache write errors (e.g., storage quota reached).
      }
    }

    function escapeHtml(value) {
      return (value || "")
        .toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function resolveDownloadUrl(item) {
      if (item.downloadUrl) return item.downloadUrl;
      const fileUrl = item.fileUrl || "";
      const fileIdMatch = fileUrl.match(FILE_ID_REGEX);
      return fileIdMatch
        ? `https://docs.google.com/spreadsheets/d/${fileIdMatch[1]}/export?format=xlsx`
        : "#";
    }

    function renderNoData(message) {
      document.getElementById("table-container").innerHTML = `<p class='no-data'>${message}</p>`;
    }

    function renderTable(data) {
      const rows = data.map(item => {
        const downloadUrl = resolveDownloadUrl(item);
        return `
          <tr>
            <td>${escapeHtml(item.dealerName)}</td>
            <td>${escapeHtml(item.location)}</td>
            <td>${escapeHtml(item.marketingPerson)}</td>
            <td>${escapeHtml(item.crm)}</td>
            <td>
              <a href="${downloadUrl}" target="_blank">
                <button>Download Excel</button>
              </a>
            </td>
          </tr>
        `;
      }).join("");

      document.getElementById("table-container").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Dealer Name</th>
              <th>Location</th>
              <th>Marketing Person</th>
              <th>CRM</th>
              <th>Download</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function loadData() {
      const crm = localStorage.getItem("crmName");
      if (!crm) {
        renderNoData("CRM name not found in localStorage.");
        return;
      }

      const cachedData = readClientCache(crm);
      if (cachedData) {
        renderTable(cachedData);
        return;
      }

      renderNoData("Loading records...");
      const apiUrl = `${API_URL}?crm=${encodeURIComponent(crm)}`;

      try {
        const res = await fetch(apiUrl);
        const json = await res.json();

        if (json.status !== "success" || !json.data.length) {
          renderNoData("No records found for this CRM.");
          return;
        }

        writeClientCache(crm, json.data);
        renderTable(json.data);

      } catch (err) {
        renderNoData(`Error fetching data: ${err.message}`);
      }
    }

    loadData();
  </script>
</body>
</html>
